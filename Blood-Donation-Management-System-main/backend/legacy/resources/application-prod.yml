spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bdms
    username: bdms
    password: bdms
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_FOR_PROD"
    expiration-ms: 86400000
  upload-dir: "uploads"
  cors:
    allowed-origins: "http://localhost:5173"
