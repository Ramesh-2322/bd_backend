server.port=${SERVER_PORT:8080}

spring.application.name=bdms-backend

# MySQL database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bdms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Load sample seed data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT configuration
jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hCYXNlNjRTZWNyZXRLZXk=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# File upload limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# File storage locations
storage.reports.location=${REPORTS_PATH:uploads/reports}
storage.medical-reports.location=${MEDICAL_REPORTS_PATH:uploads/medical-reports}

# Logging
logging.level.root=INFO
logging.level.com.bdms=DEBUG
logging.level.org.springframework.security=INFO
